<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark Customer Check-In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="app-container">
        <!-- Main customer login panel -->
        <div class="glass-panel login-panel animated-border">
            <div class="icon-container">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <h2 style="margin-bottom: 0.5rem;">Customer Check-In</h2>
            <p style="color:var(--text-secondary); text-align:center; margin-bottom:2.5rem; font-size: 0.95rem;">
                Welcome! Enter your slot and code to check in securely.
            </p>
            
            <form id="checkin-form">
                <div class="input-group floating">
                    <input type="text" id="checkin-code" placeholder=" " maxlength="4" required>
                    <label>4-Digit Unique Code</label>
                </div>
                
                <button type="submit" class="btn primary-btn glow-btn">Verify & Check-In</button>
                
                <div class="error-msg" id="checkin-error"></div>
                <div id="checkin-success" style="color:var(--color-available); text-align:center; margin-top:1rem; font-weight:600; display:block; min-height:20px;"></div>
            </form>
        </div>
    </div>
    
    <script src="staff.js"></script>
</body>
</html>
